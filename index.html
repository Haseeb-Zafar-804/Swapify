<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Swapify — Premium Peer Swap Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        .container
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== GLOBAL LOADER ========== */
        .global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .global-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid #e2e2e2;
            border-top: 4px solid #2d2d2d;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Skeleton Loading */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 5px;
            padding: 0.5rem;
        }
        .skeleton-card {
            background: #fafafa;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #ececec;
            animation: pulse 1.4s infinite;
        }
        .skeleton-img { height: 160px; background: #eaeef2; }
        .skeleton-text { height: 14px; background: #eef2f5; margin: 12px; border-radius: 4px; }
        .skeleton-text.short { width: 60%; }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        /* ========== NAVBAR ========== */
        .navbar {
            background: #ffffff;
            border-bottom: 1px solid #eef2f5;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.7rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 2;
            min-width: 200px;
        }
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .logo-img { height: 38px; width: auto; }
        .logo-text {
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #2c2c2c, #1e1e1e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-search {
            background: #ffffff;

        }
        .back-btn {

        .back-btn:hover { background: #e2e8f0; transform: scale(1.05); }
        
        .detail-grid {

        .detail-price {

        .detail-desc {

        .detail-seller-card {

        .detail-seller-card p {

        .detail-buttons {

        .detail-btn {
            flex: 1;

            border: none;

<script>

        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        function truncateDescription(desc, limit = 28) {
            if (!desc) return '';
            if (desc.length <= limit) return desc;
            return desc.substring(0, limit) + '....';
        }
        function showToast(msg, isErr=false) { 
            let div = document.createElement('div'); div.className = 'toast';

        function isValidPakistanPhone(phone) { return /^\+92[0-9]{10}$/.test(phone); }
        async function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
            });
        }
        
        async function captureUserLocationOnce() {
            if (locationCaptured && userLocation) return userLocation;
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    userLocation = { city: "Lahore, Pakistan", area: "Punjab Region" };
                    locationCaptured = true;
                    resolve(userLocation);
                    return;
                }
                navigator.geolocation.getCurrentPosition(

                        let cityName = "Pakistan", areaDetail = "Major City";
                        try {
                            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}&zoom=12`);
                            const geoData = await geoRes.json();
                            const addr = geoData.address || {};
                            cityName = addr.city || addr.town || addr.village || addr.state || "Pakistan";
                            areaDetail = addr.suburb || addr.neighbourhood || addr.county || cityName;

                    },

                    }

            });
        }
        
        async function loadProducts(search = '') {
            const now = Date.now();
            if (productsCache && (now - productsCacheTime) < CACHE_DURATION && !search) {
                cachedProducts = productsCache;
                return cachedProducts;
            }
            
            let query = supabase.from('products').select('*').eq('status', 'available');
            if (search) query = query.ilike('product_name', `%${search}%`);
            const { data, error } = await query.order('created_at', { ascending: false });
            if (error) return [];
            cachedProducts = data || [];
            if (!search) {
                productsCache = cachedProducts;
                productsCacheTime = now;
            }
            return cachedProducts;
        }
        
        async function addProduct(product) {
            const newProduct = {
                id: generateId(),
                product_name: product.productName.trim(),
                description: product.description || '',
                condition: product.condition || 'Like New',
                price_coins: parseInt(product.priceCoins),
                location: product.location || userLocation?.city || 'Pakistan',
                image_url: product.imageUrl || '',
                seller_id: currentUser.id,
                seller_name: currentUser.name,
                created_at: new Date().toISOString(),
                status: 'available'
            };
            const { error } = await supabase.from('products').insert([newProduct]);
            if (error) { showToast("Failed: " + error.message, true); return false; }
            productsCache = null;
            showToast("Item listed!", false);
            return true;
        }
        
        async function updateProduct(productId, updates) {
            const { error } = await supabase.from('products').update(updates).eq('id', productId).eq('seller_id', currentUser.id);
            if (error) { showToast("Update failed", true); return false; }
            productsCache = null;
            showToast("Updated", false);
            return true;
        }
        
        async function deleteProduct(productId) {
            const { error } = await supabase.from('products').delete().eq('id', productId).eq('seller_id', currentUser.id);
            if (error) return false;
            productsCache = null;
            showToast("Removed", false);
            return true;
        }
        
        async function loginUser(email, password) {
            const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('password', password);
            if (error || !data || data.length === 0) return { success: false, message: "Invalid email/password" };
            return { success: true, user: data[0] };
        }
        
        async function registerUser(name, email, phone, password) {
            if (!isValidPakistanPhone(phone)) return { success: false, message: "WhatsApp must be +92xxxxxxxxxx" };
            const { data: existing } = await supabase.from('users').select('email').eq('email', email);
            if (existing && existing.length) { return { success: false, message: "Email already used" }; }
            const newUser = {
                id: generateId(),
                name: name.trim(),
                email: email.trim().toLowerCase(),
                phone: phone.trim(),
                password: password,
                coins: 100,
                created_at: new Date().toISOString(),
                used_codes: {}
            };
            const { error } = await supabase.from('users').insert([newUser]);
            if (error) return { success: false, message: error.message };
            return { success: true, user: newUser };
        }
        
        async function redeemCode(code) {
            const validCodes = { 'H646CVHDG6': 500, 'SWAPIFY100': 100, 'WELCOME50': 50, 'GOLD200': 200, 'TRADEPK': 150 };
            const upper = code.toUpperCase();
            if (!validCodes[upper]) { showToast("Invalid code", true); return false; }
            const { data: u } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
            const used = u.used_codes || {};
            if (used[upper]) { showToast("Already redeemed", true); return false; }
            const newCoins = u.coins + validCodes[upper];
            used[upper] = new Date();
            const { error } = await supabase.from('users').update({ coins: newCoins, used_codes: used }).eq('id', currentUser.id);
            if (error) return false;
            currentUser.coins = newCoins;
            localStorage.setItem('swapify_user', JSON.stringify(currentUser));
            showToast(`+${validCodes[upper]} coins! Balance: ${newCoins}`, false);
            return true;
        }
        
        function requestCoinsViaWhatsApp(amount, reason) {
            const adminWhatsApp = "+923432021486";
            const message = `*COIN REQUEST* - Swapify\n\nUser: ${currentUser.name}\nEmail: ${currentUser.email}\nPhone: ${currentUser.phone}\nRequested Coins: ${amount}\nReason: ${reason}\n\nPlease review and add coins.`;
            const url = `https://wa.me/${adminWhatsApp.replace('+', '')}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
            showToast(`Request sent to admin via WhatsApp`, false);
            return true;
        }
        
        async function purchaseRedirectToWhatsApp(sellerId, productName, priceCoins, sellerName) {
            if (currentUser.coins < priceCoins) { showToast(`Insufficient coins! Need ${priceCoins} coins.`, true); return; }
            if (currentUser.id === sellerId) { showToast("You cannot purchase your own item", true); return; }
            const { data: sellerInfo } = await supabase.from('users').select('phone').eq('id', sellerId).single();
            if (!sellerInfo?.phone) { showToast("Seller contact not available", true); return; }
            const message = `*BUY REQUEST* (Swapify)\n\nProduct: "${productName}"\nPrice: ${priceCoins} coins\nBuyer: ${currentUser.name}\nWhatsApp: ${currentUser.phone}\nLocation: ${userLocation?.city || 'Pakistan'}`;
            window.open(`https://wa.me/${sellerInfo.phone.replace('+', '')}?text=${encodeURIComponent(message)}`, '_blank');
            showToast(`Inquiry sent to ${sellerName}`, false);
        }
        
        async function directSwapToWhatsApp(sellerId, targetProductName, sellerName) {
            const { data: sellerInfo } = await supabase.from('users').select('phone').eq('id', sellerId).single();
            let phoneRaw = sellerInfo?.phone?.replace('+', '') || '923000000000';
            const message = `SWAP REQUEST (Swapify)\n\n${currentUser.name} wants to swap.\nMy WhatsApp: ${currentUser.phone}\nProduct: "${targetProductName}"`;
            window.open(`https://wa.me/${phoneRaw}?text=${encodeURIComponent(message)}`, '_blank');
            showToast(`Swap request sent to ${sellerName}`, false);
        }
        
        function showProductDetail(product) {
            const isOwner = currentUser.id === product.seller_id;
            const imgSrc = product.image_url || 'https://placehold.co/800x600/f8fafc/8ba0bc?text=Swap+Item';
            const detailHTML = `
                <div class="product-detail-page" id="productDetailPage">
                    <div class="detail-header">
                        <button class="back-btn" id="closeDetailBtn"><i class="fas fa-arrow-left"></i></button>
                        <h3 style="margin:0;">Product Details</h3>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-image-section">
                            <img class="detail-main-img" src="${escapeHtml(imgSrc)}" alt="${escapeHtml(product.product_name)}" onerror="this.src='https://placehold.co/800x600/f8fafc/8ba0bc?text=Image'">
                        </div>
                        <div class="detail-info-section">
                            <h1 class="detail-title">${escapeHtml(product.product_name)}</h1>
                            <div class="detail-price">${product.price_coins} Coins</div>
                            <div class="detail-desc">${escapeHtml(product.description || 'No description provided.')}</div>
                            <div class="detail-seller-card">
                                <p><i class="fas fa-user-circle"></i> <strong>${escapeHtml(product.seller_name)}</strong></p>
                                <p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(product.location)}</p>
                                <p><i class="fas fa-tag"></i> Condition: ${escapeHtml(product.condition)}</p>
                            </div>
                            ${!isOwner ? `
                                <div class="detail-buttons">
                                    <button class="detail-btn detail-btn-buy" id="detailBuyBtn">Buy Now</button>
                                    <button class="detail-btn detail-btn-swap" id="detailSwapBtn">Swap on WhatsApp</button>
                                </div>
                            ` : `
                                <div class="detail-buttons">
                                    <button class="detail-btn detail-btn-edit" id="detailEditBtn">Edit Item</button>
                                    <button class="detail-btn detail-btn-delete" id="detailDeleteBtn">Delete Item</button>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', detailHTML);
            document.getElementById('closeDetailBtn').onclick = () => document.getElementById('productDetailPage').remove();
            if (!isOwner) {
                document.getElementById('detailBuyBtn').onclick = () => {
                    document.getElementById('productDetailPage').remove();
                    purchaseRedirectToWhatsApp(product.seller_id, product.product_name, product.price_coins, product.seller_name);
                };
                document.getElementById('detailSwapBtn').onclick = () => {
                    document.getElementById('productDetailPage').remove();
                    directSwapToWhatsApp(product.seller_id, product.product_name, product.seller_name);
                };
            } else {
                document.getElementById('detailEditBtn').onclick = () => {
                    document.getElementById('productDetailPage').remove();
                    editProductItem(product.id, product.product_name, product.description, product.condition, product.price_coins, product.location, product.image_url);
                };
                document.getElementById('detailDeleteBtn').onclick = async () => {
                    if(confirm("Delete this item?")) {
                        document.getElementById('productDetailPage').remove();
                        if(await deleteProduct(product.id)) renderHomePage(currentSearch);
                    }
                };
            }
        }
        
        let currentSearch = '';
        async function renderHomePage(searchTerm = '') {
            currentSearch = searchTerm;
            const products = await loadProducts(searchTerm);
            if (!locationCaptured && currentUser) await captureUserLocationOnce();
            
            const productsHTML = products.map(p => {
                const shortDesc = truncateDescription(p.description, 28);
                return `
                <div class="product-card" data-product-id="${p.id}">
                    <img class="product-image" src="${escapeHtml(p.image_url || 'https://placehold.co/600x400/f8fafc/8ba0bc?text=Swapify+Item')}" onerror="this.src='https://placehold.co/600x400/f8fafc/8ba0bc?text=Image'">
                    <div class="product-info">
                        <div class="title-bar"><span class="product-title">${escapeHtml(p.product_name)}</span><span class="coin-tag">${p.price_coins} Coins</span></div>
                        <div class="product-desc">${escapeHtml(shortDesc)}</div>
                        <div class="seller-row"><i class="fas fa-user-circle"></i> ${escapeHtml(p.seller_name)}<span style="margin-left:auto;"><i class="fas fa-location-dot"></i> ${escapeHtml(p.location)}</span></div>
                        <div class="action-buttons" onclick="event.stopPropagation()">
                            ${currentUser.id !== p.seller_id ? `
                                <button class="btn-buy" data-sid="${p.seller_id}" data-price="${p.price_coins}" data-pname="${escapeHtml(p.product_name).replace(/'/g, "\\'")}" data-sname="${escapeHtml(p.seller_name).replace(/'/g, "\\'")}">Buy</button>
                                <button class="btn-swap" data-sid="${p.seller_id}" data-pname="${escapeHtml(p.product_name).replace(/'/g, "\\'")}" data-sname="${escapeHtml(p.seller_name).replace(/'/g, "\\'")}">Swap</button>
                            ` : `
                                <button class="btn-edit" data-pid="${p.id}" data-name="${escapeHtml(p.product_name).replace(/'/g, "\\'")}" data-desc="${escapeHtml(p.description || '').replace(/'/g, "\\'")}" data-condition="${escapeHtml(p.condition).replace(/'/g, "\\'")}" data-price="${p.price_coins}" data-location="${escapeHtml(p.location).replace(/'/g, "\\'")}" data-image="${escapeHtml(p.image_url || '').replace(/'/g, "\\'")}">Edit</button>
                                <button class="btn-delete" data-pid="${p.id}">Delete</button>
                            `}
                        </div>
                    </div>
                </div>
            `}).join('');
            
            document.getElementById('root').innerHTML = `
    <nav class="navbar"><div class="nav-container"><div class="logo-area"><div class="brand-logo"><img src="https://img.icons8.com/ios-filled/100/2d2d2d/swap.png" alt="Swapify" style="width:36px; height:36px;"><span class="logo-text">Swapify</span></div><div class="header-search"><i class="fas fa-search" style="color:#94a3b8;"></i><input type="text" id="headerSearchInput" placeholder="Search phones, bikes..." value="${escapeHtml(searchTerm)}"><button id="headerSearchBtn">Search</button></div></div><div class="header-actions"><span class="coin-badge-header" id="requestCoinsBtn"><i class="fas fa-coins"></i> ${currentUser.coins} <i class="fas fa-plus-circle" style="font-size:0.7rem;"></i></span><button class="nav-icon-btn" id="profileBtn"><i class="fas fa-user-circle"></i> Profile</button><button class="nav-icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div></nav>
    <div class="icon-bar"><button class="icon-item" id="sellIconBtn"><i class="fas fa-plus-circle"></i><span>Sell</span></button><button class="icon-item" id="coinsIconBtn"><i class="fas fa-coins"></i><span>Coins</span></button><button class="icon-item" id="redeemIconBtn"><i class="fas fa-ticket-alt"></i><span>Redeem</span></button></div>
    <div class="container"><div class="products-grid">${products.length ? productsHTML : '<div style="text-align:center; padding:2rem;">No items found</div>'}</div></div>
    <div class="footer"><i class="fas fa-handshake"></i> Swapify — Click any product for professional details</div>
    <div id="sellModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('sellModal')">&times;</span><h3>List New Item</h3><form id="productForm"><input type="text" id="prodName" placeholder="Product name *" required><textarea id="prodDesc" rows="2" placeholder="Description"></textarea><input type="text" id="prodCondition" placeholder="Condition" value="Like New"><input type="number" id="prodPrice" placeholder="Price in coins *" min="1" required><input type="text" id="prodLocation" placeholder="Location" value="${userLocation?.city || 'Pakistan'}"><div class="upload-zone" onclick="document.getElementById('imageFile').click()"><i class="fas fa-cloud-upload-alt"></i> Click to upload image</div><input type="file" id="imageFile" accept="image/*" style="display:none"><div id="imagePreviewDiv" class="preview-img"></div><input type="hidden" id="editIdHidden"><input type="hidden" id="imageBase64Hidden"><button type="submit" class="modal-btn">Publish</button></form></div></div>
    <div id="redeemModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('redeemModal')">&times;</span><h3>Redeem Code</h3><input type="text" id="codeInput" placeholder="Enter secret code"><button id="redeemBtn" class="modal-btn">Redeem Now</button><p style="text-align:center; font-size:0.65rem; margin-top:0.8rem;">Codes: H646CVHDG6, SWAPIFY100, WELCOME50, GOLD200, TRADEPK</p></div></div>
    <div id="requestCoinsModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('requestCoinsModal')">&times;</span><h3>Request Coins</h3><input type="number" id="reqAmount" placeholder="Amount of coins" min="10" step="10"><textarea id="reqReason" rows="3" placeholder="Why do you need coins? (e.g., want to buy an item, promotion, etc.)"></textarea><button id="submitRequestBtn" class="modal-btn">Submit Request via WhatsApp</button><p style="font-size:0.7rem; color:#666; margin-top:0.8rem;">Your request will be sent to admin on WhatsApp for review.</p></div></div>
    <div id="profileModalView" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('profileModalView')">&times;</span><div class="profile-avatar"><i class="fas fa-user-astronaut"></i></div><h3 style="text-align:center;">${escapeHtml(currentUser.name)}</h3><div class="info-row"><span>Email:</span><span>${escapeHtml(currentUser.email)}</span></div><div class="info-row"><span>WhatsApp:</span><span>${escapeHtml(currentUser.phone)}</span></div><div class="info-row"><span>Coins:</span><span><strong>${currentUser.coins}</strong></span></div><div class="info-row"><span>Location:</span><span>${userLocation?.city || 'Pakistan'}</span></div><button onclick="closeModal('profileModalView')" class="modal-btn">Close</button></div></div>`;
            
            attachEvents(products);
        }
        
        function attachEvents(products) {
            document.getElementById('headerSearchBtn').onclick = () => renderHomePage(document.getElementById('headerSearchInput').value);
            document.getElementById('headerSearchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') renderHomePage(e.target.value); });
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('swapify_user'); currentUser = null; renderLoginPage(); };
            document.getElementById('profileBtn').onclick = () => { document.getElementById('profileModalView').style.display = 'flex'; };
            document.getElementById('sellIconBtn').onclick = () => openSellModal();
            document.getElementById('coinsIconBtn').onclick = () => { showToast(`Balance: ${currentUser.coins} coins`, false); };
            document.getElementById('redeemIconBtn').onclick = () => { document.getElementById('redeemModal').style.display = 'flex'; };
            document.getElementById('requestCoinsBtn').onclick = () => { document.getElementById('requestCoinsModal').style.display = 'flex'; };
            document.getElementById('submitRequestBtn').onclick = () => {
                const amount = parseInt(document.getElementById('reqAmount').value);
                const reason = document.getElementById('reqReason').value;
                if(!amount || amount < 10) { showToast("Please enter valid amount (min 10)", true); return; }
                if(!reason.trim()) { showToast("Please provide a reason", true); return; }
                requestCoinsViaWhatsApp(amount, reason);
                closeModal('requestCoinsModal');
                document.getElementById('reqAmount').value = '';
                document.getElementById('reqReason').value = '';
            };
            document.getElementById('redeemBtn').onclick = async () => { const code = document.getElementById('codeInput').value; if(await redeemCode(code)){ closeModal('redeemModal'); renderHomePage(currentSearch); } };
            
            document.querySelectorAll('.product-card').forEach(card => {
                const productId = card.dataset.productId;
                const product = cachedProducts.find(p => p.id === productId);
                if(product) card.addEventListener('click', (e) => { if(!e.target.closest('.action-buttons')) showProductDetail(product); });
            });
            
            document.querySelectorAll('.btn-buy').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); purchaseRedirectToWhatsApp(btn.dataset.sid, btn.dataset.pname, parseInt(btn.dataset.price), btn.dataset.sname); });
            document.querySelectorAll('.btn-swap').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); directSwapToWhatsApp(btn.dataset.sid, btn.dataset.pname, btn.dataset.sname); });
            document.querySelectorAll('.btn-edit').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); editProductItem(btn.dataset.pid, btn.dataset.name, btn.dataset.desc, btn.dataset.condition, btn.dataset.price, btn.dataset.location, btn.dataset.image); });
            document.querySelectorAll('.btn-delete').forEach(btn => btn.onclick = async (e) => { e.stopPropagation(); if(confirm("Delete?")) if(await deleteProduct(btn.dataset.pid)) renderHomePage(currentSearch); });
            
            document.getElementById('productForm').onsubmit = async (e) => {
                e.preventDefault();
                const editId = document.getElementById('editIdHidden').value;
                const data = { productName: document.getElementById('prodName').value, description: document.getElementById('prodDesc').value, condition: document.getElementById('prodCondition').value, priceCoins: parseInt(document.getElementById('prodPrice').value), location: document.getElementById('prodLocation').value, imageUrl: document.getElementById('imageBase64Hidden').value };
                if(!data.productName || data.priceCoins<1) { showToast("Valid name & price needed", true); return; }
                let ok = editId ? await updateProduct(editId, { product_name: data.productName, description: data.description, condition: data.condition, price_coins: data.priceCoins, location: data.location, image_url: data.imageUrl }) : await addProduct(data);
                if(ok) { closeModal('sellModal'); renderHomePage(currentSearch); }
            };
            document.getElementById('imageFile').onchange = async (e) => { if(e.target.files[0]){ if(e.target.files[0].size > 1*1024*1024) { showToast("Max 1MB", true); return; } const b64 = await imageToBase64(e.target.files[0]); document.getElementById('imageBase64Hidden').value = b64; document.getElementById('imagePreviewDiv').innerHTML = `<img src="${b64}">`; } };
        }
        
        function editProductItem(id, name, desc, condition, price, location, image) {
            document.getElementById('editIdHidden').value = id;
            document.getElementById('prodName').value = name;
            document.getElementById('prodDesc').value = desc;
            document.getElementById('prodCondition').value = condition;
            document.getElementById('prodPrice').value = price;
            document.getElementById('prodLocation').value = location;
            if(image && image !== 'null') { document.getElementById('imageBase64Hidden').value = image; document.getElementById('imagePreviewDiv').innerHTML = `<img src="${image}">`; }
            else { document.getElementById('imageBase64Hidden').value = ''; document.getElementById('imagePreviewDiv').innerHTML = ''; }
            document.getElementById('sellModal').style.display = 'flex';
        }
        function openSellModal() { document.getElementById('editIdHidden').value = ''; document.getElementById('productForm').reset(); document.getElementById('imageBase64Hidden').value = ''; document.getElementById('imagePreviewDiv').innerHTML = ''; document.getElementById('sellModal').style.display = 'flex'; }
        function closeModal(id) { if(document.getElementById(id)) document.getElementById(id).style.display = 'none'; }
        window.closeModal = closeModal; window.openSellModal = openSellModal;
        
        async function renderLoginPage() {
            document.getElementById('root').innerHTML = `<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#ffffff; padding:1rem;"><div style="background:white; border-radius:48px; max-width:400px; width:90%; padding:1.8rem; box-shadow:0 20px 35px -15px rgba(0,0,0,0.08); border:1px solid #eef2f8;"><div style="text-align:center;"><i class="fas fa-handshake fa-3x" style="color:#2d2d2d;"></i><h1 style="margin:10px 0;">Swapify</h1><p style="color:#6c819a;">Pakistan's trusted swap marketplace</p></div><div style="display:flex; gap:10px; margin:24px 0;"><button id="showLoginTab" class="modal-btn" style="margin:0;">Sign In</button><button id="showSignupTab" class="modal-btn" style="margin:0; background:#f1f5f9; color:#1a1a1a;">Sign Up</button></div><div id="loginPanel"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Password"><button id="doLoginBtn" class="modal-btn">Login</button></div><div id="signupPanel" style="display:none;"><input type="text" id="signName" placeholder="Full name"><input type="email" id="signEmail" placeholder="Email"><input type="tel" id="signPhone" placeholder="WhatsApp (+92xxxxxxxxxx)"><input type="password" id="signPassword" placeholder="Password (min 6)"><button id="doSignupBtn" class="modal-btn">Create Account (100 free coins)</button></div></div></div>`;
            document.getElementById('showLoginTab').onclick = () => { document.getElementById('loginPanel').style.display='block'; document.getElementById('signupPanel').style.display='none'; };
            document.getElementById('showSignupTab').onclick = () => { document.getElementById('loginPanel').style.display='none'; document.getElementById('signupPanel').style.display='block'; };
            document.getElementById('doLoginBtn').onclick = async () => { 
                showSkeleton();
                let res = await loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); 
                if(res.success){ currentUser=res.user; await captureUserLocationOnce(); localStorage.setItem('swapify_user', JSON.stringify(currentUser)); renderHomePage(); } 
                else { showToast(res.message, true); removeSkeleton(); }
            };
            document.getElementById('doSignupBtn').onclick = async () => { 
                showSkeleton();
                let res = await registerUser(document.getElementById('signName').value, document.getElementById('signEmail').value, document.getElementById('signPhone').value, document.getElementById('signPassword').value); 
                if(res.success){ currentUser=res.user; await captureUserLocationOnce(); localStorage.setItem('swapify_user', JSON.stringify(currentUser)); renderHomePage(); } 
                else { showToast(res.message, true); removeSkeleton(); }
            };
        }
        
        const savedUser = localStorage.getItem('swapify_user');
        if(savedUser) { 
            try { 
                currentUser = JSON.parse(savedUser); 
                (async()=>{ 
                    showSkeleton();
                    const storedLoc = localStorage.getItem(`swapify_loc_${currentUser.id}`); 
                    if(storedLoc){ userLocation=JSON.parse(storedLoc); locationCaptured=true; } 
                    else await captureUserLocationOnce(); 
                    await renderHomePage(); 
                    hideLoader();
                })(); 
            } catch(e){ renderLoginPage(); hideLoader(); } 
        } else { renderLoginPage(); hideLoader(); }
    })();
</script>
</body>
</html>
