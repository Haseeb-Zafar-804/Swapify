<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Swapify — Premium Peer Swap Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.4.2/css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f4f7fb 0%, #e9eef4 100%);
            color: #1a2c3e;
            min-height: 100vh;
            overflow-x: hidden;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
        }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.7rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0b3b4f, #2d8f6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-links {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            cursor: pointer;
            padding: 0.4rem 0.9rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.75rem;
            background: transparent;
            border: none;
            color: #2c4a6e;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-link:hover {
            background: #e8f0f7;
            transform: translateY(-1px);
        }

        .coin-badge {
            background: linear-gradient(135deg, #fff8e7, #ffefc4);
            padding: 0.35rem 1rem;
            border-radius: 50px;
            font-weight: 700;
            color: #c2781a;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #ffe2a4;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.05rem;
        }

        /* Search */
        .search-wrapper {
            background: white;
            border-radius: 60px;
            border: 1px solid #e2eaf1;
            padding: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 1.5rem;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .search-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.85rem;
            background: transparent;
            padding: 0.7rem 1rem;
            min-width: 0;
        }
        .search-wrapper button {
            background: #1e6f5c;
            border: none;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .search-wrapper button:hover {
            background: #0e5546;
            transform: scale(0.98);
        }

        /* Tabs Section - Swipeable for Mobile */
        .info-tabs-section {
            background: white;
            border-radius: 28px;
            margin-bottom: 1.8rem;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
            border: 1px solid #eef2f8;
        }
        .tabs-header {
            display: flex;
            gap: 0;
            background: #f8fafd;
            border-bottom: 1px solid #e2edf2;
            overflow-x: auto;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .tabs-header::-webkit-scrollbar {
            height: 2px;
        }
        .tab-btn {
            flex: 0 0 auto;
            padding: 0.8rem 1rem;
            font-weight: 700;
            font-size: 0.8rem;
            background: transparent;
            border: none;
            color: #5f7f9e;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            position: relative;
        }
        .tab-btn.active {
            color: #1e6f5c;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #1e6f5c;
            border-radius: 2px;
        }
        .tab-content {
            padding: 1.2rem;
            background: white;
            overflow-x: hidden;
        }
        .tab-pane {
            display: none;
            animation: fadeIn 0.2s ease;
        }
        .tab-pane.active-pane {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .info-card {
            background: #f9fcfd;
            border-radius: 24px;
            padding: 1rem;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 0.8rem 0;
            flex-wrap: wrap;
            border-bottom: 1px solid #eef2f8;
            padding-bottom: 0.7rem;
        }
        .info-label {
            font-weight: 700;
            width: 110px;
            color: #2b4f6c;
            font-size: 0.8rem;
        }
        .info-value {
            color: #2c6e5b;
            font-weight: 500;
            font-size: 0.85rem;
            word-break: break-word;
            flex: 1;
        }
        .loc-badge {
            background: #eef6f3;
            border-radius: 40px;
            padding: 0.25rem 1rem;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .footer {
            background: #0d2c2a;
            color: #bfdad2;
            text-align: center;
            padding: 1.5rem 1rem;
            margin-top: 2rem;
            font-size: 0.7rem;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }
        .product-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03);
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }
        .product-image {
            width: 100%;
            height: 190px;
            object-fit: cover;
            background: #f0f4f9;
        }
        .product-info {
            padding: 1rem;
        }
        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
        }
        .product-title {
            font-size: 1rem;
            font-weight: 800;
            color: #0a2b3b;
        }
    
        .coin-tag {
            background: #eef6f3;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #1d7a63;
        }
        .product-desc {
            font-size: 0.75rem;
            color: #54708f;
            margin: 0.5rem 0;
            line-height: 1.4;
        }
        .seller-row {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.7rem;
            color: #6b8aac;
            margin: 0.5rem 0;
            border-top: 1px solid #eef2f7;
            padding-top: 0.5rem;
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        .btn-buy, .btn-whatsapp, .btn-swap, .btn-edit, .btn-delete {
            padding: 0.5rem 0;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s;
        }
        .btn-buy { background: linear-gradient(135deg, #1e6f5c, #1a5f4e); color: white; }
        .btn-whatsapp { background: linear-gradient(135deg, #25D366, #20b859); color: white; }
        .btn-swap { background: linear-gradient(135deg, #f59e0b, #e67e22); color: white; }
        .btn-edit { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-delete { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        
        .btn-buy:hover, .btn-whatsapp:hover, .btn-swap:hover, .btn-edit:hover, .btn-delete:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        /* Modal Styles - Fixed */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 37, 48, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.8rem;
            position: relative;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
        }
        .modal-content h3 {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            color: #1a2c3e;
            text-align: center;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            margin: 0.6rem 0;
            border: 1.5px solid #e1eaf1;
            border-radius: 30px;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        .modal-content input:focus, .modal-content textarea:focus {
            outline: none;
            border-color: #2d8f6e;
            box-shadow: 0 0 0 3px rgba(45, 143, 110, 0.08);
        }
        .upload-zone {
            background: #f9fcfd;
            border: 1.5px dashed #bdd4e2;
            border-radius: 30px;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            margin: 0.6rem 0;
            transition: 0.2s;
        }
        .upload-zone:hover {
            background: #f0f7fa;
            border-color: #2d8f6e;
        }
        .preview-img {
            margin: 0.5rem 0;
        }
        .preview-img img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 16px;
        }
        .modal-btn {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.8rem;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-btn-primary {
            background: linear-gradient(135deg, #1e6f5c, #1a5f4e);
            color: white;
        }
        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30,111,92,0.3);
        }
        .modal-btn-secondary {
            background: #eef2f7;
            color: #2c4a6e;
            margin-top: 0.5rem;
        }
        .modal-btn-secondary:hover {
            background: #e2e8f0;
        }
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8ba5bc;
            transition: 0.2s;
        }
        .close-modal:hover {
            color: #dc2626;
        }

        /* Profile Modal */
        .profile-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 37, 48, 0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        .profile-modal-content {
            background: white;
            border-radius: 40px;
            max-width: 450px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.8rem;
            position: relative;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e6f5c, #34a375);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.5rem;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f3e;
            color: white;
            padding: 0.7rem 1.3rem;
            border-radius: 60px;
            z-index: 1100;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.75rem;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 640px) {
            .nav-container { padding: 0.6rem 0.8rem; }
            .container { padding: 0.8rem; }
            .info-label { width: 95px; font-size: 0.75rem; }
            .tab-btn { padding: 0.6rem 0.9rem; font-size: 0.7rem; }
            .action-buttons { flex-direction: row; }
            .toast { white-space: normal; text-align: center; max-width: 85%; }
        }
        /* Login/Signup Input Fields - Clean & Modern */
.login-container input,
.signup-container input,
#loginPanel input,
#signupPanel input {
    width: 100%;
    padding: 0.9rem 1.2rem;
    margin: 0.7rem 0;
    border: 1.5px solid #e1eaf1;
    border-radius: 50px;
    font-size: 0.9rem;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #ffffff;
    transition: all 0.25s ease;
    outline: none;
    color: #1a2c3e;
}

/* Input Focus State */
.login-container input:focus,
.signup-container input:focus,
#loginPanel input:focus,
#signupPanel input:focus {
    border-color: #2d8f6e;
    box-shadow: 0 0 0 4px rgba(45, 143, 110, 0.1);
    transform: translateY(-1px);
}

/* Input Hover State */
.login-container input:hover,
.signup-container input:hover,
#loginPanel input:hover,
#signupPanel input:hover {
    border-color: #bdd4e2;
}

/* Placeholder Styling */
.login-container input::placeholder,
.signup-container input::placeholder,
#loginPanel input::placeholder,
#signupPanel input::placeholder {
    color: #a0b8cc;
    font-weight: 400;
    font-size: 0.85rem;
}

/* Mobile Responsive */
@media (max-width: 640px) {
    .login-container input,
    .signup-container input,
    #loginPanel input,
    #signupPanel input {
        padding: 0.75rem 1rem;
        font-size: 0.85rem;
        margin: 0.6rem 0;
    }
}

/* Error State (optional) */
.login-container input.error,
.signup-container input.error,
#loginPanel input.error,
#signupPanel input.error {
    border-color: #dc2626;
    background: #fef2f2;
}

.login-container input.error:focus,
.signup-container input.error:focus {
    box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.1);
}

/* Success State (optional) */
.login-container input.success,
.signup-container input.success,
#loginPanel input.success,
#signupPanel input.success {
    border-color: #10b981;
}

/* For password fields specifically */
input[type="password"] {
    letter-spacing: 0.1rem;
}
    </style>
</head>
<body>
<div id="root"></div>

<script>
    (function() {
        const SUPABASE_URL = "https://rnspqdxonmqluaslxyat.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_XIokUrQbjYt3RI434NxjeA_RaRqwTHe";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let cachedProducts = [];
        let userLocation = null;
        let locationCaptured = false;

        function escapeHtml(str) { 
            if (!str) return ''; 
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${escapeHtml(message)}`;
            toast.style.background = isError ? '#dc2626' : '#1e6f5c';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }
        
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 8); }
        function isValidPakistanPhone(phone) { return /^\+92[0-9]{10}$/.test(phone); }
        
        async function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
            });
        }

        // GEOLOCATION - capture once, store area/city name only
        async function captureUserLocationOnce() {
            if (locationCaptured && userLocation) return userLocation;
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    userLocation = { city: "Lahore, Pakistan", area: "Punjab Region" };
                    locationCaptured = true;
                    resolve(userLocation);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        let cityName = "Pakistan";
                        let areaDetail = "Major City";
                        try {
                            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=12&addressdetails=1`);
                            const geoData = await geoRes.json();
                            const addr = geoData.address || {};
                            cityName = addr.city || addr.town || addr.village || addr.state || "Pakistan";
                            areaDetail = addr.suburb || addr.neighbourhood || addr.county || cityName;
                        } catch(e) { 
                            cityName = "Pakistan"; 
                            areaDetail = "Urban Area";
                        }
                        userLocation = { city: cityName, area: areaDetail };
                        locationCaptured = true;
                        if (currentUser) {
                            localStorage.setItem(`swapify_loc_${currentUser.id}`, JSON.stringify(userLocation));
                        }
                        resolve(userLocation);
                    },
                    () => {
                        userLocation = { city: "Karachi, Pakistan", area: "Sindh Region" };
                        locationCaptured = true;
                        resolve(userLocation);
                    }
                );
            });
        }

        // DB Operations
        async function loadProducts(search = '') {
            let query = supabase.from('products').select('*').eq('status', 'available');
            if (search) query = query.ilike('product_name', `%${search}%`);
            const { data, error } = await query.order('created_at', { ascending: false });
            if (error) return [];
            cachedProducts = data || [];
            return cachedProducts;
        }

        async function addProduct(product) {
            const newProduct = {
                id: generateId(),
                product_name: product.productName.trim(),
                description: product.description || '',
                condition: product.condition || 'Like New',
                price_coins: parseInt(product.priceCoins),
                location: product.location || userLocation?.city || 'Pakistan',
                image_url: product.imageUrl || '',
                seller_id: currentUser.id,
                seller_name: currentUser.name,
                created_at: new Date().toISOString(),
                status: 'available'
            };
            const { error } = await supabase.from('products').insert([newProduct]);
            if (error) { showToast("Failed: " + error.message, true); return false; }
            showToast("✨ Item listed successfully!", false);
            return true;
        }

        async function updateProduct(productId, updates) {
            const { error } = await supabase.from('products').update(updates).eq('id', productId).eq('seller_id', currentUser.id);
            if (error) { showToast("Update failed", true); return false; }
            showToast("✅ Product updated", false);
            return true;
        }

        async function deleteProduct(productId) {
            const { error } = await supabase.from('products').delete().eq('id', productId).eq('seller_id', currentUser.id);
            if (error) return false;
            showToast("🗑️ Product removed", false);
            return true;
        }

        async function loginUser(email, password) {
            const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('password', password);
            if (error || !data || data.length === 0) return { success: false, message: "Invalid email/password" };
            return { success: true, user: data[0] };
        }

        async function registerUser(name, email, phone, password) {
            if (!isValidPakistanPhone(phone)) return { success: false, message: "WhatsApp must be +92xxxxxxxxxx" };
            const { data: existing } = await supabase.from('users').select('email').eq('email', email);
            if (existing && existing.length) return { success: false, message: "Email already used" };
            const newUser = {
                id: generateId(),
                name: name.trim(),
                email: email.trim().toLowerCase(),
                phone: phone.trim(),
                password: password,
                coins: 100,
                created_at: new Date().toISOString(),
                used_codes: {}
            };
            const { error } = await supabase.from('users').insert([newUser]);
            if (error) return { success: false, message: error.message };
            return { success: true, user: newUser };
        }

        async function redeemCode(code) {
            const validCodes = { 'H646CVHDG6': 500, 'SWAPIFY100': 100, 'WELCOME50': 50, 'GOLD200': 200, 'TRADEPK': 150 };
            const upper = code.toUpperCase();
            if (!validCodes[upper]) { showToast("Invalid code", true); return false; }
            const { data: u } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
            const used = u.used_codes || {};
            if (used[upper]) { showToast("Already redeemed", true); return false; }
            const newCoins = u.coins + validCodes[upper];
            used[upper] = new Date();
            const { error } = await supabase.from('users').update({ coins: newCoins, used_codes: used }).eq('id', currentUser.id);
            if (error) return false;
            currentUser.coins = newCoins;
            localStorage.setItem('swapify_user', JSON.stringify(currentUser));
            showToast(`🎉 +${validCodes[upper]} coins! New balance: ${newCoins}`, false);
            return true;
        }

        // Direct Swap
        async function directSwapToWhatsApp(sellerId, targetProductName, sellerName) {
            try {
                const { data: sellerInfo } = await supabase.from('users').select('phone').eq('id', sellerId).single();
                let phoneRaw = sellerInfo?.phone || '+923000000000';
                phoneRaw = phoneRaw.replace('+', '');
                const locationText = userLocation ? `📍 My location: ${userLocation.city} (${userLocation.area})` : '📍 Pakistan';
                const message = `🔄 SWAP REQUEST (Swapify)\n\n👤 Name: ${currentUser.name}\n📧 Email: ${currentUser.email}\n📞 WhatsApp: ${currentUser.phone}\n${locationText}\n\nI want to swap my item with your product: "${targetProductName}". Let's connect for swap details!`;
                window.open(`https://wa.me/${phoneRaw}?text=${encodeURIComponent(message)}`, '_blank');
                showToast(`💬 Swap request sent to ${sellerName}`, false);
            } catch(err) { showToast("Swap error", true); }
        }

        async function contactSeller(sellerId, productName, sellerName) {
            const { data: seller } = await supabase.from('users').select('phone').eq('id', sellerId).single();
            if (seller?.phone) {
                const msg = `Hello ${sellerName}, I'm ${currentUser.name} from Swapify. Interested in "${productName}". Is it available?`;
                window.open(`https://wa.me/${seller.phone.replace('+', '')}?text=${encodeURIComponent(msg)}`, '_blank');
            } else showToast("Contact unavailable", true);
        }

        async function quickBuy(productId, sellerId, price, productName) {
            if (currentUser.coins < price) { showToast(`Need ${price} coins! You have ${currentUser.coins}`, true); return; }
            if (currentUser.id === sellerId) { showToast("Cannot buy your own item", true); return; }
            const { data: buyer } = await supabase.from('users').select('coins').eq('id', currentUser.id).single();
            if (buyer.coins < price) return;
            const { data: sellerCoin } = await supabase.from('users').select('coins').eq('id', sellerId).single();
            await supabase.from('users').update({ coins: buyer.coins - price }).eq('id', currentUser.id);
            await supabase.from('users').update({ coins: sellerCoin.coins + price }).eq('id', sellerId);
            await supabase.from('products').update({ status: 'sold' }).eq('id', productId);
            currentUser.coins = buyer.coins - price;
            localStorage.setItem('swapify_user', JSON.stringify(currentUser));
            showToast(`✅ Purchased ${productName} for ${price} coins!`, false);
            renderHomePage();
        }

        // Tabs with swipe
        let currentTabIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;
        
        function initTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            const panes = document.querySelectorAll('.tab-pane');
            
            function activateTab(index) {
                tabs.forEach((t, i) => {
                    t.classList.toggle('active', i === index);
                });
                panes.forEach((p, i) => {
                    p.classList.toggle('active-pane', i === index);
                });
                currentTabIndex = index;
                if (index === 1) document.getElementById('tab1').innerHTML = renderUserDetailsHTML();
                if (index === 2) document.getElementById('tab2').innerHTML = renderLocationHTML();
                if (index === 0) document.getElementById('tab0').innerHTML = renderAmountHTML();
            }
            
            tabs.forEach((tab, idx) => {
                tab.onclick = () => activateTab(idx);
            });
            
            const section = document.querySelector('.info-tabs-section');
            if (section) {
                section.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
                section.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    if (Math.abs(touchEndX - touchStartX) > 50) {
                        if (touchEndX < touchStartX && currentTabIndex < tabs.length - 1) activateTab(currentTabIndex + 1);
                        else if (touchEndX > touchStartX && currentTabIndex > 0) activateTab(currentTabIndex - 1);
                    }
                });
            }
            activateTab(0);
        }
        
        function renderUserDetailsHTML() {
            return `
                <div class="info-card">
                    <div class="info-row"><span class="info-label"><i class="fas fa-user"></i> Full Name</span><span class="info-value">${escapeHtml(currentUser.name)}</span></div>

                    <div class="info-row"><span class="info-label"><i class="fas fa-calendar"></i> Joined</span><span class="info-value">${new Date(currentUser.created_at || Date.now()).toLocaleDateString()}</span></div>
                </div>
            `;

        function renderAmountHTML() {

                    <div class="info-row"><span class="info-label"><i class="fas fa-ticket"></i> Redeem Code</span><span class="info-value"><button class="nav-link" onclick="document.getElementById('redeemModal').style.display='flex'" style="background:#eef2f7; padding:0.4rem 1rem;">🎫 Redeem</button></span></div>
                    <div class="info-row"><span class="info-label"><i class="fas fa-gem"></i> Request Coins</span><span class="info-value"><button class="nav-link" onclick="window.requestCoinsAction()" style="background:#eef2f7; padding:0.4rem 1rem;">💎 Request</button></span></div>
                </div>

        }

        let currentSearch = '';
        async function renderHomePage(searchTerm = '') {
            currentSearch = searchTerm;
            const products = await loadProducts(searchTerm);
            if (!locationCaptured && currentUser) await captureUserLocationOnce();
            
            const productsHTML = products.map(p => {
                const isOwner = currentUser.id === p.seller_id;
                const imgSrc = p.image_url || 'https://placehold.co/600x400/eef2f8/7c9bb0?text=Swap+Item';
                return `
                    <div class="product-card">
                        <img class="product-image" src="${escapeHtml(imgSrc)}" alt="${escapeHtml(p.product_name)}" onerror="this.src='https://placehold.co/600x400/eef2f8/7c9bb0?text=Image'">
                        <div class="product-info">
                            <div class="title-bar"><span class="product-title">${escapeHtml(p.product_name)}</span><span class="coin-tag">🪙 ${p.price_coins}</span></div>
                            <div class="product-desc">${escapeHtml((p.description || '').substring(0, 85))}</div>
                            <div class="seller-row"><i class="fas fa-user-circle"></i> ${escapeHtml(p.seller_name)}<span style="margin-left:auto;"><i class="fas fa-location-dot"></i> ${escapeHtml(p.location)}</span></div>
                            <div class="action-buttons">
                                ${!isOwner ? `
                                    <button class="btn-buy" data-pid="${p.id}" data-sid="${p.seller_id}" data-price="${p.price_coins}" data-name="${escapeHtml(p.product_name).replace(/'/g, "\\'")}"><i class="fas fa-shopping-cart"></i> Buy</button>
                                    <button class="btn-whatsapp" data-sid="${p.seller_id}" data-pname="${escapeHtml(p.product_name).replace(/'/g, "\\'")}" data-sname="${escapeHtml(p.seller_name).replace(/'/g, "\\'")}"><i class="fab fa-whatsapp"></i> Chat</button>
                                    <button class="btn-swap" data-sid="${p.seller_id}" data-pname="${escapeHtml(p.product_name).replace(/'/g, "\\'")}" data-sname="${escapeHtml(p.seller_name).replace(/'/g, "\\'")}"><i class="fas fa-exchange-alt"></i> Swap</button>
                                ` : `
                                    <button class="btn-edit" data-pid="${p.id}" data-name="${escapeHtml(p.product_name).replace(/'/g, "\\'")}" data-desc="${escapeHtml(p.description || '').replace(/'/g, "\\'")}" data-condition="${escapeHtml(p.condition).replace(/'/g, "\\'")}" data-price="${p.price_coins}" data-location="${escapeHtml(p.location).replace(/'/g, "\\'")}" data-image="${escapeHtml(p.image_url || '').replace(/'/g, "\\'")}"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="btn-delete" data-pid="${p.id}"><i class="fas fa-trash"></i> Delete</button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            const emptyMsg = products.length === 0 ? `<div style="text-align:center; background:white; border-radius:40px; padding:2rem;"><i class="fas fa-store-slash fa-3x" style="color:#8ba5bc;"></i><p style="margin-top:1rem;">No items found. List your first swap item!</p></div>` : '';
            
            document.getElementById('root').innerHTML = `
                <nav class="navbar"><div class="nav-container"><div class="logo"><i class="fas fa-exchange-alt"></i> Swapify.pk</div>
                <div class="nav-links"><button class="nav-link" onclick="window.renderHomePage()"><i class="fas fa-store"></i> Market</button><button class="nav-link" onclick="window.openSellModal()"><i class="fas fa-plus-circle"></i> Sell</button><span class="coin-badge"><i class="fas fa-coins"></i> ${currentUser.coins}</span><button class="nav-link" id="profileBtn"><i class="fas fa-user-circle"></i> Profile</button><button class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Exit</button></div></div></nav>
                <div class="container">
                    <div class="search-wrapper"><i class="fas fa-search" style="margin-left:0.5rem;"></i><input type="text" id="searchInput" placeholder="Search phones, bikes, clothes, electronics..." value="${escapeHtml(searchTerm)}"><button id="searchBtn">Search</button></div>
                    
                    <div class="info-tabs-section">
                        <div class="tabs-header"><button class="tab-btn" data-tab="0">Coins</button><button class="tab-btn" data-tab="1">My Details</button><button class="tab-btn" data-tab="2">My Area</button></div>
                        <div class="tab-content"><div id="tab0" class="tab-pane">${renderAmountHTML()}</div><div id="tab1" class="tab-pane">${renderUserDetailsHTML()}</div><div id="tab2" class="tab-pane">${renderLocationHTML()}</div></div>
                    </div>
                    
                    <div class="products-grid">${products.length ? productsHTML : emptyMsg}</div>
                </div>
                <div class="footer"><i class="fas fa-handshake"></i> Swapify — Trusted peer swap • Location saved once • Swap directly via WhatsApp</div>
                
                <!-- Sell Modal -->
                <div id="sellModal" class="modal">
                    <div class="modal-content">
                        <span class="close-modal" onclick="closeModal('sellModal')">&times;</span>
                        <h3><i class="fas fa-plus-circle"></i> List New Item</h3>
                        <form id="productForm">
                            <input type="text" id="prodName" placeholder="Product name *" required>
                            <textarea id="prodDesc" rows="2" placeholder="Description (optional)"></textarea>
                            <input type="text" id="prodCondition" placeholder="Condition" value="Like New">
                            <input type="number" id="prodPrice" placeholder="Price in coins *" min="1" required>
                            <input type="text" id="prodLocation" placeholder="Location" value="${userLocation?.city || 'Pakistan'}">
                            <div class="upload-zone" onclick="document.getElementById('imageFile').click()">
                                <i class="fas fa-cloud-upload-alt"></i> Click to upload image (optional)
                            </div>
                            <input type="file" id="imageFile" accept="image/*" style="display:none">
                            <div id="imagePreviewDiv" class="preview-img"></div>
                            <input type="hidden" id="editIdHidden">
                            <input type="hidden" id="imageBase64Hidden">
                            <button type="submit" class="modal-btn modal-btn-primary"><i class="fas fa-paper-plane"></i> Publish Listing</button>
                        </form>
                    </div>
                </div>
                
                <!-- Redeem Modal -->
                <div id="redeemModal" class="modal">
                    <div class="modal-content">
                        <span class="close-modal" onclick="closeModal('redeemModal')">&times;</span>
                        <h3><i class="fas fa-ticket-alt"></i> Redeem Code</h3>
                        <input type="text" id="codeInput" placeholder="Enter your secret code" style="text-align:center; font-size:1rem;">
                        <button id="redeemBtn" class="modal-btn modal-btn-primary"><i class="fas fa-gift"></i> Redeem Now</button>
                        <p style="text-align:center; font-size:0.7rem; color:#8ba5bc; margin-top:1rem;">Available codes: H646CVHDG6, SWAPIFY100, WELCOME50, GOLD200, TRADEPK</p>
                    </div>
                </div>
            `;
            
            initTabs();
            document.getElementById('searchBtn').onclick = () => renderHomePage(document.getElementById('searchInput').value);
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('swapify_user'); currentUser = null; renderLoginPage(); };
            document.getElementById('profileBtn').onclick = () => showProfileModal();
            document.getElementById('redeemBtn').onclick = async () => { 
                const code = document.getElementById('codeInput').value;
                if(await redeemCode(code)){ 
                    closeModal('redeemModal'); 
                    renderHomePage(currentSearch); 
                }
            };
            
            // attach dynamic events
            document.querySelectorAll('.btn-buy').forEach(btn => btn.onclick = (e) => { quickBuy(btn.dataset.pid, btn.dataset.sid, parseInt(btn.dataset.price), btn.dataset.name); });
            document.querySelectorAll('.btn-whatsapp').forEach(btn => btn.onclick = (e) => { contactSeller(btn.dataset.sid, btn.dataset.pname, btn.dataset.sname); });
            document.querySelectorAll('.btn-swap').forEach(btn => btn.onclick = (e) => { directSwapToWhatsApp(btn.dataset.sid, btn.dataset.pname, btn.dataset.sname); });
            document.querySelectorAll('.btn-edit').forEach(btn => btn.onclick = (e) => { 
                editProductItem(btn.dataset.pid, btn.dataset.name, btn.dataset.desc, btn.dataset.condition, btn.dataset.price, btn.dataset.location, btn.dataset.image); 
            });
            document.querySelectorAll('.btn-delete').forEach(btn => btn.onclick = async (e) => { 
                if(confirm("Delete this product?")) 
                    if(await deleteProduct(btn.dataset.pid)) renderHomePage(currentSearch); 
            });
            
            document.getElementById('productForm').onsubmit = async (e) => {
                e.preventDefault();
                const editId = document.getElementById('editIdHidden').value;
                const data = { 
                    productName: document.getElementById('prodName').value, 
                    description: document.getElementById('prodDesc').value, 
                    condition: document.getElementById('prodCondition').value, 
                    priceCoins: parseInt(document.getElementById('prodPrice').value), 
                    location: document.getElementById('prodLocation').value, 
                    imageUrl: document.getElementById('imageBase64Hidden').value 
                };
                if(!data.productName || data.priceCoins<1) { showToast("Product name and valid price required", true); return; }
                let ok = editId ? await updateProduct(editId, { 
                    product_name: data.productName, 
                    description: data.description, 
                    condition: data.condition, 
                    price_coins: data.priceCoins, 
                    location: data.location, 
                    image_url: data.imageUrl 
                }) : await addProduct(data);
                if(ok) { closeModal('sellModal'); renderHomePage(currentSearch); }
            };
            document.getElementById('imageFile').onchange = async (e) => { 
                if(e.target.files[0]){
                    if(e.target.files[0].size > 1 * 1024 * 1024) { showToast("Image max 1MB", true); return; }
                    const b64 = await imageToBase64(e.target.files[0]); 
                    document.getElementById('imageBase64Hidden').value = b64; 
                    document.getElementById('imagePreviewDiv').innerHTML = `<img src="${b64}" style="max-width:100%; border-radius:20px;">`; 
                }
            };
        }
        
        function editProductItem(id,name,desc,condition,price,location,image){
            document.getElementById('modalTitle') && (document.getElementById('modalTitle').innerText = '✏️ Edit Product');
            document.getElementById('editIdHidden').value = id;
            document.getElementById('prodName').value = name;
            document.getElementById('prodDesc').value = desc;
            document.getElementById('prodCondition').value = condition;
            document.getElementById('prodPrice').value = price;
            document.getElementById('prodLocation').value = location;
            if(image && image !== 'null' && image !== ''){
                document.getElementById('imageBase64Hidden').value = image;
                document.getElementById('imagePreviewDiv').innerHTML = `<img src="${image}" style="max-width:100%; border-radius:20px;">`;
            } else {
                document.getElementById('imageBase64Hidden').value = '';
                document.getElementById('imagePreviewDiv').innerHTML = '';
            }
            document.getElementById('sellModal').style.display = 'flex';
        }
        
        window.renderHomePage = renderHomePage;
        window.openSellModal = () => { 
            document.getElementById('editIdHidden').value = '';
            document.getElementById('productForm').reset();
            document.getElementById('imageBase64Hidden').value = '';
            document.getElementById('imagePreviewDiv').innerHTML = '';
            document.getElementById('sellModal').style.display = 'flex'; 
        };
        window.requestCoinsAction = () => { 
            let amt = prompt("Request coins (max 2000)", "100"); 
            if(amt && !isNaN(amt) && amt > 0 && amt <= 2000) 
                window.open(`https://wa.me/9233618771497?text=${encodeURIComponent(`Hi Swapify, I need ${amt} coins. Name: ${currentUser.name}, Email: ${currentUser.email}`)}`,'_blank'); 
            else if(amt > 2000) showToast("Maximum 2000 coins per request", true);
        };
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.closeModal = closeModal;
        
        async function renderLoginPage() {
            document.getElementById('root').innerHTML = `
                <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, #eef2f8 0%, #e2e8f0 100%); padding:1.5rem;">
                    <div style="background:white; border-radius:56px; max-width:440px; width:90%; padding:2rem; box-shadow:0 30px 50px -20px rgba(0,0,0,0.2);">
                        <div style="text-align:center;">
                            <i class="fas fa-handshake fa-3x" style="color:#1e6f5c;"></i>
                            <h1 style="margin:12px 0 6px; font-size:2rem;">Swapify</h1>
                            <p style="color:#6b8aac;">Pakistan's trusted swap marketplace</p>
                        </div>
                        <div style="display:flex; gap:12px; margin:28px 0 20px;">
                            <button id="showLoginTab" class="modal-btn modal-btn-primary" style="margin:0;">Sign In</button>
                            <button id="showSignupTab" class="modal-btn modal-btn-secondary" style="margin:0;">Sign Up</button>
                        </div>
                        <div id="loginPanel">
                            <input type="email" id="loginEmail" placeholder="Email address">
                            <input type="password" id="loginPassword" placeholder="Password">
                            <button id="doLoginBtn" class="modal-btn modal-btn-primary">Login →</button>
                        </div>
                        <div id="signupPanel" style="display:none;">
                            <input type="text" id="signName" placeholder="Full name">
                            <input type="email" id="signEmail" placeholder="Email">
                            <input type="tel" id="signPhone" placeholder="WhatsApp (+92xxxxxxxxxx)">
                            <input type="password" id="signPassword" placeholder="Password (min 6)">
                            <button id="doSignupBtn" class="modal-btn modal-btn-primary">Create Account (100 free coins)</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('showLoginTab').onclick = () => { document.getElementById('loginPanel').style.display='block'; document.getElementById('signupPanel').style.display='none'; };
            document.getElementById('showSignupTab').onclick = () => { document.getElementById('loginPanel').style.display='none'; document.getElementById('signupPanel').style.display='block'; };
            document.getElementById('doLoginBtn').onclick = async () => { 
                const res = await loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); 
                if(res.success){ 
                    currentUser = res.user; 
                    await captureUserLocationOnce(); 
                    localStorage.setItem('swapify_user', JSON.stringify(currentUser)); 
                    renderHomePage(); 
                } else showToast(res.message, true); 
            };
            document.getElementById('doSignupBtn').onclick = async () => { 
                const res = await registerUser(
                    document.getElementById('signName').value,
                    document.getElementById('signEmail').value,
                    document.getElementById('signPhone').value,
                    document.getElementById('signPassword').value
                ); 
                if(res.success){ 
                    currentUser = res.user; 
                    await captureUserLocationOnce(); 
                    localStorage.setItem('swapify_user', JSON.stringify(currentUser)); 
                    renderHomePage(); 
                } else showToast(res.message, true); 
            };
        }
        
        const saved = localStorage.getItem('swapify_user');
        if(saved) { 
            try { 
                currentUser = JSON.parse(saved); 
                (async()=>{ 
                    const storedLoc = localStorage.getItem(`swapify_loc_${currentUser.id}`); 
                    if(storedLoc){ 
                        userLocation = JSON.parse(storedLoc); 
                        locationCaptured = true; 
                    } else await captureUserLocationOnce(); 
                    renderHomePage(); 
                })(); 
            } catch(e){ renderLoginPage(); } 
        } else renderLoginPage();
    })();
