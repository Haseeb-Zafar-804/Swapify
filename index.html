<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swapify - Secure Real-Time Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2a5298, #6b48ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1f2937;
            background: transparent;
            border: none;
        }

        .nav-link:hover {
            background: #f3f4f6;
        }

        .coin-badge {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-weight: 600;
            color: #92400e;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
            border: 1px solid #e5e7eb;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 100px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1f2937;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            z-index: 3000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .online-indicator {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                padding: 1rem;
            }
            .container {
                padding: 1rem;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: white;
        }
        
        .error-message {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            color: #991b1b;
        }
        
        .warning-banner {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            color: #92400e;
            padding: 0.75rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p style="margin-top: 1rem;">Connecting to Swapify...</p>
        </div>
    </div>

    <script>
        // Wait for DOM and Supabase to be ready
        (function() {
            // Check if Supabase is loaded
            if (typeof window.supabase === 'undefined') {
                document.getElementById('app').innerHTML = `
                    <div style="min-height:100vh; display:flex; justify-content:center; align-items:center; padding:1rem;">
                        <div class="card" style="max-width:600px; text-align:center;">
                            <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#ef4444;"></i>
                            <h2 style="margin:1rem 0;">Network Error</h2>
                            <p>Please check your internet connection and refresh the page.</p>
                            <button onclick="location.reload()" style="margin-top:1rem;">Retry</button>
                        </div>
                    </div>
                `;
                return;
            }

            // ========== SUPABASE CONFIGURATION ==========
            const SUPABASE_URL = "https://rnspqdxonmqluaslxyat.supabase.co";
            const SUPABASE_ANON_KEY = "sb_publishable_XIokUrQbjYt3RI434NxjeA_RaRqwTHe";
            
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let currentUser = null;
            let realtimeSubscription = null;

            // ========== SECURITY: ESCAPE HTML FUNCTION ==========
            function escapeHtml(str) {
                if (str == null || str === undefined) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ========== SECURITY: SANITIZE INPUT ==========
            function sanitizeInput(str) {
                if (typeof str !== 'string') return '';
                return str.trim().replace(/[<>]/g, '');
            }

            function showToast(message, isError = false) {
                const sanitizedMessage = escapeHtml(message);
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${sanitizedMessage}`;
                toast.style.background = isError ? '#dc2626' : '#10b981';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 9) + Math.random().toString(36).substr(2, 5);
            }

            // ========== TEST CONNECTION ==========
            async function testConnection() {
                try {
                    const { data, error } = await supabaseClient.from('users').select('count', { count: 'exact', head: true });
                    if (error) {
                        console.error("Connection error:", error);
                        return false;
                    }
                    return true;
                } catch (err) {
                    console.error("Connection test failed:", err);
                    return false;
                }
            }

            // ========== USER AUTHENTICATION (Sanitized) ==========
            async function registerUser(name, email, phone, password) {
                const sanitizedName = sanitizeInput(name);
                const sanitizedEmail = sanitizeInput(email).toLowerCase();
                const sanitizedPhone = sanitizeInput(phone);
                
                if (!sanitizedName || !sanitizedEmail || !sanitizedPhone || password.length < 6) {
                    return { success: false, message: "Invalid input provided" };
                }
                
                const { data: existing } = await supabaseClient
                    .from('users')
                    .select('email')
                    .eq('email', sanitizedEmail);
                
                if (existing && existing.length > 0) {
                    return { success: false, message: "Email already registered!" };
                }
                
                const newUser = {
                    id: generateId(),
                    name: sanitizedName,
                    email: sanitizedEmail,
                    phone: sanitizedPhone,
                    password: password,
                    coins: 100,
                    created_at: new Date().toISOString(),
                    used_codes: {}
                };
                
                const { error } = await supabaseClient.from('users').insert([newUser]);
                if (error) {
                    console.error("Registration error:", error);
                    return { success: false, message: error.message };
                }
                return { success: true, user: newUser };
            }
            
            async function loginUser(email, password) {
                const sanitizedEmail = sanitizeInput(email).toLowerCase();
                
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', sanitizedEmail)
                    .eq('password', password);
                
                if (error) {
                    console.error("Login error:", error);
                    return { success: false, message: "Database error: " + error.message };
                }
                
                if (!data || data.length === 0) {
                    return { success: false, message: "Invalid email or password!" };
                }
                
                return { success: true, user: data[0] };
            }
            
            // ========== PRODUCT FUNCTIONS ==========
            async function loadProducts() {
                const { data, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .eq('status', 'available')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error("Error loading products:", error);
                    return [];
                }
                return data || [];
            }
            
            async function addProduct(productData) {
                const sanitizedProductName = sanitizeInput(productData.productName);
                const sanitizedDescription = sanitizeInput(productData.description || '');
                const sanitizedCondition = sanitizeInput(productData.condition || 'Like New');
                const sanitizedLocation = sanitizeInput(productData.location || 'Online');
                const price = parseInt(productData.priceCoins);
                
                if (!sanitizedProductName || isNaN(price) || price <= 0) {
                    showToast("Invalid product data", true);
                    return false;
                }
                
                const newProduct = {
                    id: generateId(),
                    product_name: sanitizedProductName,
                    description: sanitizedDescription,
                    condition: sanitizedCondition,
                    price_coins: price,
                    location: sanitizedLocation,
                    seller_id: currentUser.id,
                    seller_name: currentUser.name,
                    created_at: new Date().toISOString(),
                    status: 'available'
                };
                
                const { error } = await supabaseClient.from('products').insert([newProduct]);
                if (error) {
                    showToast("❌ Failed to list product: " + error.message, true);
                    return false;
                }
                showToast("✅ Product listed successfully!", false);
                return true;
            }
            
            async function purchaseProduct(productId, sellerId, price, productName) {
                if (currentUser.coins < price) {
                    showToast(`❌ Need ${price} coins! You have ${currentUser.coins}`, true);
                    return false;
                }
                
                if (currentUser.id === sellerId) {
                    showToast("❌ Cannot buy your own product!", true);
                    return false;
                }
                
                const { data: buyerData } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();
                
                const { data: sellerData } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', sellerId)
                    .single();
                
                if (!buyerData || !sellerData || buyerData.coins < price) {
                    showToast("❌ Transaction failed", true);
                    return false;
                }
                
                await supabaseClient
                    .from('users')
                    .update({ coins: buyerData.coins - price })
                    .eq('id', currentUser.id);
                
                await supabaseClient
                    .from('users')
                    .update({ coins: sellerData.coins + price })
                    .eq('id', sellerId);
                
                await supabaseClient
                    .from('products')
                    .update({ status: 'sold' })
                    .eq('id', productId);
                
                currentUser.coins = buyerData.coins - price;
                
                showToast(`🎉 Purchased ${escapeHtml(productName)} for ${price} coins!`, false);
                return true;
            }
            
            async function deleteProduct(productId) {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', productId)
                    .eq('seller_id', currentUser.id);
                
                if (error) {
                    showToast("❌ Failed to delete product", true);
                    return false;
                }
                showToast("🗑️ Product removed successfully", false);
                return true;
            }
            
            async function redeemCode(code) {
                const codes = {
                    'WELCOME50': 50,
                    'SWAPIFY100': 100,
                    'GOLD200': 200,
                    'TRADE500': 500,
                    'VIP1000': 1000
                };
                
                const upperCode = sanitizeInput(code).toUpperCase();
                if (!codes[upperCode]) {
                    showToast("❌ Invalid code! Try: SWAPIFY100, WELCOME50, GOLD200, TRADE500, VIP1000", true);
                    return false;
                }
                
                const { data: userData } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();
                
                if (!userData) {
                    showToast("❌ User not found", true);
                    return false;
                }
                
                const usedCodes = userData.used_codes || {};
                if (usedCodes[upperCode]) {
                    showToast("❌ Code already used!", true);
                    return false;
                }
                
                const newCoins = userData.coins + codes[upperCode];
                usedCodes[upperCode] = new Date().toISOString();
                
                const { error } = await supabaseClient
                    .from('users')
                    .update({ coins: newCoins, used_codes: usedCodes })
                    .eq('id', currentUser.id);
                
                if (error) {
                    showToast("❌ Failed to redeem code", true);
                    return false;
                }
                
                currentUser.coins = newCoins;
                showToast(`✅ +${codes[upperCode]} coins! New balance: ${newCoins}`, false);
                return true;
            }
            
            function setupRealtimeListener() {
                if (realtimeSubscription) {
                    supabaseClient.removeChannel(realtimeSubscription);
                }
                
                realtimeSubscription = supabaseClient
                    .channel('products-channel')
                    .on('postgres_changes', 
                        { event: '*', schema: 'public', table: 'products' },
                        () => {
                            if (currentUser) {
                                renderHomePage();
                            }
                        }
                    )
                    .subscribe();
            }
            
            // ========== SECURE UI RENDERING ==========
            async function renderHomePage() {
                const products = await loadProducts();
                
                let productsHTML = '';
                if (products.length === 0) {
                    productsHTML = `
                        <div style="text-align:center; padding:3rem;">
                            <i class="fas fa-exchange-alt fa-3x" style="color:#cbd5e1;"></i>
                            <p style="margin-top:1rem; color:#6b7280;">No products yet. Be the first to list something!</p>
                            <button onclick="document.getElementById('sellModal').style.display='flex'" style="margin-top:1rem;">
                                <i class="fas fa-plus-circle"></i> List Your Item
                            </button>
                        </div>
                    `;
                } else {
                    productsHTML = products.map(p => {
                        const isOwner = currentUser.id === p.seller_id;
                        const productName = escapeHtml(p.product_name);
                        const description = escapeHtml(p.description || 'No description');
                        const sellerName = escapeHtml(p.seller_name);
                        const location = escapeHtml(p.location);
                        const condition = escapeHtml(p.condition);
                        const safeProductId = escapeHtml(p.id);
                        const safeSellerId = escapeHtml(p.seller_id);
                        
                        return `
                            <div class="product-card">
                                <h3><i class="fas fa-tag"></i> ${productName}</h3>
                                <p style="color:#6b7280; margin:0.75rem 0;">${description}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin:1rem 0;">
                                    <span class="coin-badge" style="padding:0.3rem 0.8rem;">🪙 ${p.price_coins} coins</span>
                                    <span><i class="fas fa-user-circle"></i> ${sellerName}</span>
                                </div>
                                <div style="font-size:0.8rem; color:#6b7280; margin-bottom:1rem;">
                                    <i class="fas fa-map-marker-alt"></i> ${location} | ${condition}
                                </div>
                                ${!isOwner ? 
                                    `<button onclick="window.purchaseProductSafe('${safeProductId}', '${safeSellerId}', ${p.price_coins}, '${productName.replace(/'/g, "\\'")}')" style="width:100%;">
                                        <i class="fas fa-shopping-cart"></i> Buy Now
                                    </button>` : 
                                    `<button class="btn-outline" onclick="window.removeProductSafe('${safeProductId}')" style="width:100%;">
                                        <i class="fas fa-trash"></i> Remove Listing
                                    </button>`
                                }
                            </div>
                        `;
                    }).join('');
                }
                
                const userCoins = currentUser.coins;
                const userName = escapeHtml(currentUser.name);
                const userEmail = escapeHtml(currentUser.email);
                
                document.getElementById('app').innerHTML = `
                    <div class="warning-banner">
                        <i class="fas fa-info-circle"></i> 
                        ⚠️ Running from local file - Some features may be limited. For best experience, use a local server.
                    </div>
                    <nav class="navbar">
                        <div class="nav-container">
                            <div class="logo">
                                <i class="fas fa-exchange-alt"></i> SWAPIFY
                            </div>
                            <div class="nav-links">
                                <button class="nav-link active" data-page="home"><i class="fas fa-home"></i> Marketplace</button>
                                <button class="nav-link" data-page="sell"><i class="fas fa-plus-circle"></i> Sell Item</button>
                                <button class="nav-link" data-page="redeem"><i class="fas fa-gift"></i> Redeem Code</button>
                                <span class="coin-badge"><i class="fas fa-coins"></i> ${userCoins} Coins</span>
                                <button class="nav-link" data-page="profile"><i class="fas fa-user"></i> ${userName}</button>
                                <button class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                            </div>
                        </div>
                    </nav>
                    
                    <div class="container">
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:1.5rem;">
                                <div>
                                    <h2><i class="fas fa-fire"></i> Live Marketplace</h2>
                                    <p style="color:#6b7280; margin-top:0.25rem;">
                                        <span class="online-indicator"></span> Real-time updates
                                    </p>
                                </div>
                                <div>
                                    <span style="background:#f3f4f6; padding:0.4rem 1rem; border-radius:100px;">
                                        <i class="fas fa-shopping-bag"></i> ${products.length} items
                                    </span>
                                </div>
                            </div>
                            <div class="products-grid">
                                ${productsHTML}
                            </div>
                        </div>
                    </div>
                    
                    <div id="sellModal" class="modal">
                        <div class="modal-content">
                            <h3><i class="fas fa-plus-circle"></i> List Your Item</h3>
                            <form id="sellForm">
                                <input type="text" id="productName" placeholder="Product Name *" required maxlength="100">
                                <textarea id="productDesc" rows="3" placeholder="Description" maxlength="500"></textarea>
                                <input type="text" id="productCondition" placeholder="Condition" value="Like New" maxlength="50">
                                <input type="number" id="productPrice" placeholder="Price in Coins *" required min="1" max="1000000">
                                <input type="text" id="productLocation" placeholder="Location" value="Online" maxlength="100">
                                <button type="submit">Publish to Marketplace</button>
                            </form>
                            <button id="closeSell" style="background:#9ca3af; margin-top:0.75rem;">Cancel</button>
                        </div>
                    </div>
                    
                    <div id="redeemModal" class="modal">
                        <div class="modal-content">
                            <h3><i class="fas fa-ticket-alt"></i> Redeem Code</h3>
                            <p style="color:#6b7280; margin:0.75rem 0;">Available codes: SWAPIFY100, WELCOME50, GOLD200, TRADE500, VIP1000</p>
                            <input type="text" id="codeInput" placeholder="Enter code" maxlength="20">
                            <button id="confirmRedeem">Redeem</button>
                            <button id="closeRedeem" style="background:#9ca3af; margin-top:0.75rem;">Cancel</button>
                        </div>
                    </div>
                `;
                
                document.querySelectorAll('.nav-link[data-page]').forEach(link => {
                    link.addEventListener('click', () => {
                        const page = link.dataset.page;
                        if (page === 'home') renderHomePage();
                        else if (page === 'sell') document.getElementById('sellModal').style.display = 'flex';
                        else if (page === 'redeem') document.getElementById('redeemModal').style.display = 'flex';
                        else if (page === 'profile') showToast(`👤 ${userName} | 📧 ${userEmail} | 🪙 ${userCoins} coins`, false);
                    });
                });
                
                document.getElementById('logoutBtn').onclick = () => {
                    currentUser = null;
                    if (realtimeSubscription) supabaseClient.removeChannel(realtimeSubscription);
                    renderLoginPage();
                };
                
                document.getElementById('closeSell').onclick = () => {
                    document.getElementById('sellModal').style.display = 'none';
                    document.getElementById('sellForm').reset();
                };
                
                document.getElementById('closeRedeem').onclick = () => {
                    document.getElementById('redeemModal').style.display = 'none';
                    document.getElementById('codeInput').value = '';
                };
                
                document.getElementById('confirmRedeem').onclick = async () => {
                    const code = document.getElementById('codeInput').value;
                    if (code && await redeemCode(code)) {
                        document.getElementById('redeemModal').style.display = 'none';
                        renderHomePage();
                    }
                };
                
                document.getElementById('sellForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const productData = {
                        productName: document.getElementById('productName').value,
                        description: document.getElementById('productDesc').value,
                        condition: document.getElementById('productCondition').value,
                        priceCoins: parseInt(document.getElementById('productPrice').value),
                        location: document.getElementById('productLocation').value
                    };
                    
                    if (!productData.productName || productData.priceCoins <= 0) {
                        showToast("Product name and valid price required!", true);
                        return;
                    }
                    
                    if (await addProduct(productData)) {
                        document.getElementById('sellModal').style.display = 'none';
                        document.getElementById('sellForm').reset();
                        renderHomePage();
                    }
                };
                
                window.onclick = (event) => {
                    const sellModal = document.getElementById('sellModal');
                    const redeemModal = document.getElementById('redeemModal');
                    if (event.target === sellModal) sellModal.style.display = 'none';
                    if (event.target === redeemModal) redeemModal.style.display = 'none';
                };
            }
            
            async function renderLoginPage() {
                document.getElementById('app').innerHTML = `
                    <div style="min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding:1rem;">
                        <div class="card" style="max-width:500px; width:100%; text-align:center;">
                            <i class="fas fa-exchange-alt" style="font-size:3.5rem; color:#667eea; margin-bottom:1rem;"></i>
                            <h1 style="font-size:2.5rem; margin-bottom:0.5rem;">Swapify</h1>
                            <p style="color:#6b7280; margin-bottom:2rem;">Real-time Swap & Trade Marketplace</p>
                            
                            <div style="display:flex; gap:0.75rem; margin-bottom:1.5rem;">
                                <button id="showLoginBtn" style="flex:1;">Sign In</button>
                                <button id="showSignupBtn" style="flex:1; background:#10b981;">Create Account</button>
                            </div>
                            
                            <div id="loginPanel">
                                <input type="email" id="loginEmail" placeholder="Email" value="demo@swapify.com" maxlength="100">
                                <input type="password" id="loginPassword" placeholder="Password" value="demo123" maxlength="100">
                                <button id="doLoginBtn" style="width:100%;"><i class="fas fa-key"></i> Login</button>
                                <p style="margin-top:0.75rem; font-size:0.8rem; color:#9ca3af;">Demo: demo@swapify.com / demo123</p>
                            </div>
                            
                            <div id="signupPanel" style="display:none;">
                                <input type="text" id="signName" placeholder="Full Name" maxlength="100">
                                <input type="email" id="signEmail" placeholder="Email" maxlength="100">
                                <input type="tel" id="signPhone" placeholder="Phone Number" maxlength="20">
                                <input type="password" id="signPassword" placeholder="Password (min 6 characters)" maxlength="100">
                                <button id="doSignupBtn" style="width:100%;">Create Account (100 free coins)</button>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('showLoginBtn').onclick = () => {
                    document.getElementById('loginPanel').style.display = 'block';
                    document.getElementById('signupPanel').style.display = 'none';
                };
                
                document.getElementById('showSignupBtn').onclick = () => {
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('signupPanel').style.display = 'block';
                };
                
                document.getElementById('doLoginBtn').onclick = async () => {
                    const email = document.getElementById('loginEmail').value;
                    const password = document.getElementById('loginPassword').value;
                    const result = await loginUser(email, password);
                    if (result.success) {
                        currentUser = result.user;
                        setupRealtimeListener();
                        renderHomePage();
                    } else {
                        showToast(result.message, true);
                    }
                };
                
                document.getElementById('doSignupBtn').onclick = async () => {
                    const name = document.getElementById('signName').value;
                    const email = document.getElementById('signEmail').value;
                    const phone = document.getElementById('signPhone').value;
                    const password = document.getElementById('signPassword').value;
                    
                    if (!name || !email || !phone || password.length < 6) {
                        showToast("All fields required, password must be at least 6 characters", true);
                        return;
                    }
                    
                    const result = await registerUser(name, email, phone, password);
                    if (result.success) {
                        currentUser = result.user;
                        setupRealtimeListener();
                        renderHomePage();
                    } else {
                        showToast(result.message, true);
                    }
                };
            }
            
            // ========== SECURE GLOBAL FUNCTIONS ==========
            window.purchaseProductSafe = async (productId, sellerId, price, productName) => {
                if (await purchaseProduct(productId, sellerId, price, productName)) {
                    renderHomePage();
                }
            };
            
            window.removeProductSafe = async (productId) => {
                if (confirm("Remove this listing?")) {
                    if (await deleteProduct(productId)) {
                        renderHomePage();
                    }
                }
            };
            
            // ========== INITIALIZATION ==========
            async function init() {
                const isConnected = await testConnection();
                if (isConnected) {
                    renderLoginPage();
                } else {
                    document.getElementById('app').innerHTML = `
                        <div style="min-height:100vh; display:flex; justify-content:center; align-items:center; padding:1rem;">
                            <div class="card" style="max-width:600px; text-align:center;">
                                <i class="fas fa-database" style="font-size:3rem; color:#ef4444;"></i>
                                <h2 style="margin:1rem 0;">Database Setup Required</h2>
                                <div class="error-message">
                                    <strong>⚠️ Please run the SQL commands below in your Supabase SQL Editor</strong>
                                </div>
                                <pre style="background:#1e1e1e; color:#d4d4d4; padding:1rem; border-radius:12px; overflow-x:auto; font-size:0.7rem; text-align:left; margin:1rem 0;">

    id TEXT PRIMARY KEY,
    name TEXT NOT NULL,

    password TEXT NOT NULL,
    coins INTEGER DEFAULT 100,
    created_at TIMESTAMP DEFAULT NOW(),
    used_codes JSONB DEFAULT '{}'
);

CREATE TABLE products (
    id TEXT PRIMARY KEY,
    product_name TEXT NOT NULL,
    description TEXT,
    condition TEXT,
    price_coins INTEGER NOT NULL,
    location TEXT,
    seller_id TEXT NOT NULL,
    seller_name TEXT NOT NULL,
    created_at TIMESTAMP DEFAULT NOW(),

);

    ('prod_1', 'Vintage Leather Jacket', 'Classic brown leather jacket', 'Like New', 150, 'New York', 'demo_user_123', 'Demo User'),
    ('prod_2', 'Mechanical Keyboard', 'RGB mechanical keyboard', 'Like New', 85, 'Los Angeles', 'demo_user_123', 'Demo User');
                                </pre>
                                <button onclick="location.reload()" style="margin-top:1rem;">I've run the SQL, Refresh Page</button>
                            </div>
                        </div>
                    `;
                }
            }
            
            init();
        })();
    </script>
</body>
