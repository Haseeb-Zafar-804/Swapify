        /* GLOBAL LOADER */
        .global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .global-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .spinner {
            width: 52px;
            height: 52px;
            border: 3px solid #e2e2e2;
            border-top: 3px solid #2d2d2d;
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

        /* Skeleton Loading */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 1rem;
        }
        .skeleton-card {
            background: #fafafa;
            border-radius: 20px;

            border: 1px solid #ececec;
            animation: pulse 1.2s ease-in-out infinite;

        @keyframes pulse {

            return new Promise((resolve, reject) => {
                if (file.size > 1.5 * 1024 * 1024) {
                    reject("Image too large (max 1.5MB)");
                    return;
                }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
            });
        }
        
        function showLoader() {
            let loader = document.getElementById('globalLoader');
            if (!loader) {
                loader = document.createElement('div');
                loader.id = 'globalLoader';
                loader.className = 'global-loader';
                loader.innerHTML = `<div class="spinner"></div><div>Loading Swapify...</div>`;
                document.body.appendChild(loader);
            }
            loader.classList.remove('hidden');
        }
        function hideLoader() { document.getElementById('globalLoader')?.classList.add('hidden'); }
        
        async function loadProducts(search = '') {
            const now = Date.now();
            if (productsCache && (now - productsCacheTime) < CACHE_DURATION && !search) {
                cachedProducts = productsCache;
                return cachedProducts;
            }
            try {
                let query = supabase.from('products').select('*').eq('status', 'available');
                if (search) query = query.ilike('product_name', `%${search}%`);
                const { data, error } = await query.order('created_at', { ascending: false });
                if (error) { console.error(error); showToast("Error loading products", true); return []; }
                cachedProducts = data || [];
                if (!search) { productsCache = cachedProducts; productsCacheTime = now; }
                return cachedProducts;
            } catch(e) { showToast("Network error", true); return []; }
        }
        
        async function addProduct(product) {
            try {
                const newProduct = {
                    id: generateId(),
                    product_name: product.productName.trim(),
                    description: product.description || '',
                    condition: 'Like New',
                    price_coins: parseInt(product.priceCoins),
                    location: product.location || 'Pakistan',
                    image_url: product.imageUrl || '',
                    seller_id: currentUser.id,
                    seller_name: currentUser.name,
                    created_at: new Date().toISOString(),
                    status: 'available'
                };
                const { error } = await supabase.from('products').insert([newProduct]);
                if (error) { showToast("Failed: " + error.message, true); return false; }
                productsCache = null;
                showToast("✅ Item listed successfully!", false);
                return true;
            } catch(e) { showToast("Error adding product", true); return false; }
        }
        
        async function deleteProduct(productId) {
            try {
                const { error } = await supabase.from('products').delete().eq('id', productId).eq('seller_id', currentUser.id);
                if (error) return false;
                productsCache = null;
                showToast("🗑️ Item removed", false);
                return true;
            } catch(e) { return false; }
        }
        
        async function loginUser(email, password) {
            const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('password', password);
            if (error || !data || data.length === 0) return { success: false, message: "Invalid email or password" };
            return { success: true, user: data[0] };
        }
        
        async function registerUser(name, email, phone, password) {
            const formattedPhone = formatPhoneForStorage(phone);
            if (!isValidPakistanPhone(phone)) { 
                return { success: false, message: "WhatsApp must start with +92 or 03 (Pakistan number)" }; 
            }
            const { data: existing } = await supabase.from('users').select('email').eq('email', email);
            if (existing && existing.length) { return { success: false, message: "Email already registered" }; }
            
            const newUser = {
                id: generateId(),
                name: name.trim(),
                email: email.trim().toLowerCase(),
                phone: formattedPhone,
                password: password,
                coins: 100,
                created_at: new Date().toISOString(),
                used_codes: {}
            };
            const { error } = await supabase.from('users').insert([newUser]);
            if (error) return { success: false, message: error.message };
            return { success: true, user: newUser };
        }
        
        async function redeemCode(code) {
            const validCodes = { 'SWAPIFY100': 100, 'WELCOME50': 50, 'GOLD200': 200, 'TRADEPK': 150 };
            const upper = code.toUpperCase();
            if (!validCodes[upper]) { showToast("Invalid code", true); return false; }
            const { data: u } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
            const used = u.used_codes || {};
            if (used[upper]) { showToast("Already redeemed", true); return false; }
            const newCoins = u.coins + validCodes[upper];
            used[upper] = new Date();
            const { error } = await supabase.from('users').update({ coins: newCoins, used_codes: used }).eq('id', currentUser.id);
            if (error) return false;
            currentUser.coins = newCoins;
            localStorage.setItem('swapify_user', JSON.stringify(currentUser));
            showToast(`+${validCodes[upper]} coins! Balance: ${newCoins}`, false);
            return true;
        }
        
        async function purchaseRedirect(sellerId, productName, price, sellerName) {
            if (currentUser.coins < price) { showToast(`Insufficient coins! Need ${price} coins`, true); return; }
            if (currentUser.id === sellerId) { showToast("Cannot buy your own item", true); return; }
            const { data: sellerInfo } = await supabase.from('users').select('phone').eq('id', sellerId).single();
            if (!sellerInfo?.phone) { showToast("Seller contact unavailable", true); return; }
            const message = `BUY REQUEST: "${productName}" for ${price} coins\nBuyer: ${currentUser.name}\nWhatsApp: ${currentUser.phone}`;
            window.open(`https://wa.me/${sellerInfo.phone.replace('+', '')}?text=${encodeURIComponent(message)}`, '_blank');
            showToast(`Inquiry sent to ${sellerName}`, false);
        }
        
        function showProductDetail(product) {
            const isOwner = currentUser.id === product.seller_id;
            const imgSrc = product.image_url || 'https://placehold.co/600x400/f8fafc/8ba0bc?text=Swap+Item';
            const detailHTML = `
                <div class="product-detail-page" id="productDetailPage">
                    <div class="detail-header">
                        <button class="back-btn" id="closeDetailBtn"><i class="fas fa-arrow-left"></i></button>
                        <h3>Product Details</h3>
                    </div>
                    <div class="detail-grid">
                        <img class="detail-main-img" src="${escapeHtml(imgSrc)}" onerror="this.src='https://placehold.co/600x400/f8fafc/8ba0bc?text=Image'">
                        <div>
                            <h1 class="detail-title">${escapeHtml(product.product_name)}</h1>
                            <div class="detail-price">${product.price_coins} Coins</div>
                            <p style="margin:1rem 0; color:#5a6e85;">${escapeHtml(product.description || 'No description')}</p>
                            <div class="detail-seller-card">
                                <p><i class="fas fa-user-circle"></i> <strong>${escapeHtml(product.seller_name)}</strong></p>
                                <p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(product.location)}</p>
                            </div>
                            ${!isOwner ? `
                                <div class="detail-buttons">
                                    <button class="detail-btn detail-btn-buy" id="detailBuyBtn">Buy Now</button>
                                    <button class="detail-btn detail-btn-swap" id="detailSwapBtn">Swap on WhatsApp</button>
                                </div>
                            ` : `
                                <div class="detail-buttons">
                                    <button class="detail-btn detail-btn-delete" id="detailDeleteBtn">Delete Item</button>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', detailHTML);
            document.getElementById('closeDetailBtn').onclick = () => document.getElementById('productDetailPage')?.remove();
            if (!isOwner) {
                document.getElementById('detailBuyBtn').onclick = () => {
                    document.getElementById('productDetailPage')?.remove();
                    purchaseRedirect(product.seller_id, product.product_name, product.price_coins, product.seller_name);
                };
                document.getElementById('detailSwapBtn').onclick = () => {
                    document.getElementById('productDetailPage')?.remove();
                    showToast(`Swap request sent`, false);
                    window.open(`https://wa.me/?text=Swap%20request%20${encodeURIComponent(product.product_name)}`, '_blank');
                };
            } else {
                document.getElementById('detailDeleteBtn').onclick = async () => {
                    if(confirm("Delete this item?")) {
                        document.getElementById('productDetailPage')?.remove();
                        if(await deleteProduct(product.id)) renderHomePage(currentSearch);
                    }
                };
            }
        }
        
        let currentSearch = '';
        async function renderHomePage(searchTerm = '') {
            currentSearch = searchTerm;
            const products = await loadProducts(searchTerm);
            
            const productsHTML = products.map(p => `
                <div class="product-card" data-product-id="${p.id}">
                    <img class="product-image" src="${escapeHtml(p.image_url || 'https://placehold.co/600x400/f8fafc/8ba0bc?text=Swapify+Item')}" onerror="this.src='https://placehold.co/600x400/f8fafc/8ba0bc?text=Image'">
                    <div class="product-info">
                        <div class="title-bar"><span class="product-title">${escapeHtml(p.product_name)}</span><span class="coin-tag">${p.price_coins} Coins</span></div>
                        <div class="product-desc">${escapeHtml(truncateDescription(p.description, 35))}</div>
                        <div class="seller-row"><i class="fas fa-user-circle"></i> ${escapeHtml(p.seller_name)}<span style="margin-left:auto;"><i class="fas fa-location-dot"></i> ${escapeHtml(p.location)}</span></div>
                        <div class="action-buttons" onclick="event.stopPropagation()">
                            ${currentUser.id !== p.seller_id ? `
                                <button class="btn-buy" data-sid="${p.seller_id}" data-price="${p.price_coins}" data-pname="${escapeHtml(p.product_name).replace(/'/g, "\\'")}" data-sname="${escapeHtml(p.seller_name).replace(/'/g, "\\'")}">Buy</button>
                                <button class="btn-swap" data-sid="${p.seller_id}" data-pname="${escapeHtml(p.product_name).replace(/'/g, "\\'")}" data-sname="${escapeHtml(p.seller_name).replace(/'/g, "\\'")}">Swap</button>
                            ` : `<button class="btn-delete" data-pid="${p.id}">Delete</button>`}
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('root').innerHTML = `
                <nav class="navbar"><div class="nav-container"><div class="logo-area"><div class="brand-logo"><img src="https://img.icons8.com/ios-filled/100/2d2d2d/swap.png" alt="Swapify" style="width:34px; height:34px;"><span class="logo-text">Swapify</span></div><div class="header-search"><i class="fas fa-search"></i><input type="text" id="headerSearchInput" placeholder="Search phones, bikes..." value="${escapeHtml(searchTerm)}"><button id="headerSearchBtn">Search</button></div></div><div class="header-actions"><span class="coin-badge-header" id="requestCoinsBtn"><i class="fas fa-coins"></i> ${currentUser.coins} <i class="fas fa-plus-circle"></i></span><button class="nav-icon-btn" id="profileBtn"><i class="fas fa-user-circle"></i> Profile</button><button class="nav-icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div></nav>
                <div class="icon-bar"><button class="icon-item" id="sellIconBtn"><i class="fas fa-plus-circle"></i><span>Sell</span></button><button class="icon-item" id="coinsIconBtn"><i class="fas fa-coins"></i><span>Coins</span></button><button class="icon-item" id="redeemIconBtn"><i class="fas fa-ticket-alt"></i><span>Redeem</span></button></div>
                <div class="hero-banner"><img class="banner-image" src="https://images.pexels.com/photos/5632381/pexels-photo-5632381.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Swapify Banner"><div class="banner-overlay"><h2>Swap • Sell • Save</h2><p>Pakistan's trusted peer marketplace</p></div></div>
                <div class="container"><h2 class="section-title">New Products </h2><div class="products-grid">${products.length ? productsHTML : '<div style="text-align:center; padding:3rem;">✨ No items found. Be the first to sell!</div>'}</div></div>
                <div class="footer"><i class="fas fa-handshake"></i> Swapify — Click any product for details</div>
                
                <div id="sellModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('sellModal')">&times;</span><h3>List New Item</h3><form id="productForm"><input type="text" id="prodName" placeholder="Product name *" required><textarea id="prodDesc" rows="2" placeholder="Description"></textarea><input type="number" id="prodPrice" placeholder="Price in coins *" min="1" required><input type="text" id="prodLocation" placeholder="Location" value="Pakistan"><div class="upload-zone" onclick="document.getElementById('imageFile').click()"><i class="fas fa-cloud-upload-alt"></i> Click to upload image</div><input type="file" id="imageFile" accept="image/*" style="display:none"><div id="imagePreviewDiv" class="preview-img"></div><input type="hidden" id="imageBase64Hidden"><button type="submit" class="modal-btn">Publish Item</button></form></div></div>
                
                <div id="redeemModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('redeemModal')">&times;</span><h3>Redeem Code</h3><input type="text" id="codeInput" placeholder="Enter promo code"><button id="redeemBtn" class="modal-btn">Redeem Now</button><p style="text-align:center; font-size:0.7rem; margin-top:0.8rem;">Codes: SWAPIFY100, WELCOME50, GOLD200, TRADEPK</p></div></div>
                
                <div id="requestCoinsModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('requestCoinsModal')">&times;</span><h3>Request Coins</h3><input type="number" id="reqAmount" placeholder="Amount" min="10"><textarea id="reqReason" rows="3" placeholder="Reason for coins"></textarea><button id="submitRequestBtn" class="modal-btn">Submit via WhatsApp</button></div></div>
                
                <div id="profileModalView" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal('profileModalView')">&times;</span><div class="profile-avatar"><i class="fas fa-user-astronaut"></i></div><h3 style="text-align:center;">${escapeHtml(currentUser.name)}</h3><div class="info-row"><span>Email:</span><span>${escapeHtml(currentUser.email)}</span></div><div class="info-row"><span>WhatsApp:</span><span>${escapeHtml(currentUser.phone)}</span></div><div class="info-row"><span>Coins:</span><span><strong>${currentUser.coins}</strong></span></div><button onclick="closeModal('profileModalView')" class="modal-btn">Close</button></div></div>
            `;
            attachEvents(products);
        }
        
        function attachEvents(products) {
            document.getElementById('headerSearchBtn').onclick = () => renderHomePage(document.getElementById('headerSearchInput').value);
            document.getElementById('headerSearchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') renderHomePage(e.target.value); });
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('swapify_user'); currentUser = null; renderLoginPage(); };
            document.getElementById('profileBtn').onclick = () => document.getElementById('profileModalView').style.display = 'flex';
            document.getElementById('sellIconBtn').onclick = () => { document.getElementById('productForm').reset(); document.getElementById('imagePreviewDiv').innerHTML = ''; document.getElementById('sellModal').style.display = 'flex'; };
            document.getElementById('coinsIconBtn').onclick = () => showToast(`💰 Balance: ${currentUser.coins} coins`, false);
            document.getElementById('redeemIconBtn').onclick = () => document.getElementById('redeemModal').style.display = 'flex';
            document.getElementById('requestCoinsBtn').onclick = () => document.getElementById('requestCoinsModal').style.display = 'flex';
            document.getElementById('submitRequestBtn').onclick = () => {
                const amount = document.getElementById('reqAmount').value;
                if(!amount || amount < 10) { showToast("Enter valid amount (min 10)", true); return; }
                showToast("Request sent to admin via WhatsApp", false);
                closeModal('requestCoinsModal');
            };
            document.getElementById('redeemBtn').onclick = async () => { const code = document.getElementById('codeInput').value; if(await redeemCode(code)){ closeModal('redeemModal'); renderHomePage(currentSearch); } };
            
            document.querySelectorAll('.product-card').forEach(card => {
                const productId = card.dataset.productId;
                const product = cachedProducts.find(p => p.id === productId);
                if(product) card.addEventListener('click', (e) => { if(!e.target.closest('.action-buttons')) showProductDetail(product); });
            });
            document.querySelectorAll('.btn-buy').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); purchaseRedirect(btn.dataset.sid, btn.dataset.pname, parseInt(btn.dataset.price), btn.dataset.sname); });
            document.querySelectorAll('.btn-swap').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); showToast(`Swap request sent`, false); window.open(`https://wa.me/?text=Swap%20request`, '_blank'); });
            document.querySelectorAll('.btn-delete').forEach(btn => btn.onclick = async (e) => { e.stopPropagation(); if(confirm("Delete?")) if(await deleteProduct(btn.dataset.pid)) renderHomePage(currentSearch); });
            
            document.getElementById('productForm').onsubmit = async (e) => {
                e.preventDefault();
                const file = document.getElementById('imageFile').files[0];
                let imgBase64 = '';
                if(file) {
                    try {
                        imgBase64 = await imageToBase64(file);
                    } catch(err) { showToast(err, true); return; }
                }
                const data = { productName: document.getElementById('prodName').value, description: document.getElementById('prodDesc').value, priceCoins: parseInt(document.getElementById('prodPrice').value), location: document.getElementById('prodLocation').value, imageUrl: imgBase64 };
                if(!data.productName || data.priceCoins < 1) { showToast("Valid name & price needed", true); return; }
                if(await addProduct(data)) { closeModal('sellModal'); renderHomePage(currentSearch); }
            };
            document.getElementById('imageFile').onchange = async (e) => { if(e.target.files[0]){ const b64 = await imageToBase64(e.target.files[0]); document.getElementById('imageBase64Hidden').value = b64; document.getElementById('imagePreviewDiv').innerHTML = `<img src="${b64}">`; } };
        }
        
        function closeModal(id) { if(document.getElementById(id)) document.getElementById(id).style.display = 'none'; }
        window.closeModal = closeModal;
        
        async function renderLoginPage() {
            document.getElementById('root').innerHTML = `<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#ffffff; padding:1rem;"><div style="background:white; border-radius:48px; max-width:400px; width:90%; padding:1.8rem; box-shadow:0 20px 35px -15px rgba(0,0,0,0.08); border:1px solid #eef2f8;"><div style="text-align:center;"><i class="fas fa-handshake fa-3x" style="color:#2d2d2d;"></i><h1 style="margin:10px 0;">Swapify</h1><p style="color:#6c819a;">Pakistan's trusted swap marketplace</p></div><div style="display:flex; gap:10px; margin:24px 0;"><button id="showLoginTab" class="modal-btn" style="margin:0;">Sign In</button><button id="showSignupTab" class="modal-btn" style="margin:0; background:#f1f5f9; color:#1a1a1a;">Sign Up</button></div><div id="loginPanel"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Password"><button id="doLoginBtn" class="modal-btn">Login</button></div><div id="signupPanel" style="display:none;"><input type="text" id="signName" placeholder="Full name"><input type="email" id="signEmail" placeholder="Email"><input type="tel" id="signPhone" placeholder="WhatsApp (+92xxxxxxxxxx)"><input type="password" id="signPassword" placeholder="Password (min 6)"><button id="doSignupBtn" class="modal-btn">Create Account (100 free coins)</button></div></div></div>`;
            
            document.getElementById('showLoginTab').onclick = () => { document.getElementById('loginPanel').style.display='block'; document.getElementById('signupPanel').style.display='none'; };
            document.getElementById('showSignupTab').onclick = () => { document.getElementById('loginPanel').style.display='none'; document.getElementById('signupPanel').style.display='block'; };
            document.getElementById('doLoginBtn').onclick = async () => { 
                let res = await loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); 
                if(res.success){ currentUser=res.user; localStorage.setItem('swapify_user', JSON.stringify(currentUser)); renderHomePage(); } 
                else { showToast(res.message || "Login failed", true); }
            };
            document.getElementById('doSignupBtn').onclick = async () => { 
                let res = await registerUser(document.getElementById('signName').value, document.getElementById('signEmail').value, document.getElementById('signPhone').value, document.getElementById('signPassword').value); 
                if(res.success){ currentUser=res.user; localStorage.setItem('swapify_user', JSON.stringify(currentUser)); showToast(`Welcome ${currentUser.name}! You have 100 coins.`, false); renderHomePage(); } 
                else { showToast(res.message || "Registration failed", true); }
            };
        }
        
        const savedUser = localStorage.getItem('swapify_user');
        if(savedUser) { 
            try { 
                currentUser = JSON.parse(savedUser); 
                renderHomePage(); 
            } catch(e){ renderLoginPage(); } 
        } else { renderLoginPage(); }
    })();
</script>
</body>
</html>
